<!doctype html>
<html lang="en">

<style>

/* Grid Suggestions & Confirmation Rules Matrix */
.suggestion-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }

.modal-instruction-hint { font-size: 12px; color: #64748b; margin-bottom: 15px; background: #f8fafc; padding: 8px; border-radius: 6px; border-left: 3px solid var(--primary-color); }
.modal-instruction-hint span { font-weight: bold; font-family: monospace; color: #1e3a8a; }
.picker-container { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-top: 8px; width: 100%; }
.picker-container input[type="color"] { width: 44px; height: 38px; padding: 2px; border: 1px solid #cbd5e1; border-radius: 6px; cursor: pointer; margin: 0; flex-shrink: 0; }
.picker-container input[type="text"] { width: 100px; margin: 0; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; font-family: monospace; text-transform: uppercase; flex-shrink: 0; height: 38px; }
.btn-bg-img-upload, .btn-bg-clear { border: none; padding: 0 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; height: 38px; display: inline-flex; align-items: center; white-space: nowrap; }
.btn-bg-img-upload { background: #475569; color: white; }
.btn-bg-clear { background: #ef4444; color: white; }
.toast-container { position: fixed; bottom: 40px; right: 30px; display: flex; flex-direction: column; gap: 6px; z-index: 10000; max-width: 380px; pointer-events: none; }
.toast-notification { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 4px 0; pointer-events: auto; opacity: 0; transform: translateY(10px); animation: toastFadeIn 0.2s ease-out forwards; display: flex; align-items: center; gap: 6px; }
body.bg-dark-contrast .toast-notification { color: rgba(255, 255, 255, 0.9); text-shadow: 0 1px 3px rgba(0, 0, 0, 0.6); }

@keyframes toastFadeIn { to { opacity: 1; transform: translateY(0); } }
.masterlist-actions { display: flex; justify-content: center; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
.masterlist-actions button { width: auto; min-width: 140px; padding: 12px 20px; border-radius: 8px; }
</style>
</head>
<body class="bg-dark-contrast">
<div class="top-bar">
  <div class="status-group">
    <span id="simpleStatusText" class="simple-status status-local-dot">● LOCAL MODE</span>
  </div>
  <div class="top-bar-buttons">
    <button onclick="openSettings()" class="secondary">Settings</button>
    <button class="btn-view" onclick="viewMasterlist()">Masterlist</button>
  </div>
</div>
<div class="container">
  <div class="center-stack-wrapper">
    <div id="frontDashboardHud" class="front-dashboard">
      <div class="front-stat">
        <div class="front-title">Total</div>
        <div id="frontTotalVal" class="front-value">0</div>
      </div>
      <div class="front-stat green">
        <div class="front-title">Checked</div>
        <div id="frontCheckedVal" class="front-value">0</div>
      </div>
      <div class="front-stat orange">
        <div class="front-title">Pending</div>
        <div id="frontPendingVal" class="front-value">0</div>
      </div>
      <div class="front-stat blue">
        <div class="front-title">Attendance</div>
        <div id="frontRateVal" class="front-value">0%</div>
      </div>
    </div>
    <div class="card">
      <h2 style="margin-top: 0; margin-bottom: 20px;">Guest Check-In</h2>
      <div class="mini-instructions">
        💡 <b>Operator Instructions:</b><br>
        • Type full/partial details & press <span>Enter</span>.<br>
        • Modal hotkeys activate automatically inside lists.
      </div>
      <form onsubmit="event.preventDefault(); checkName();" style="margin-top: 10px;">
        <input type="text" id="nameInput" placeholder="Enter guest details..." autocomplete="off">
        <button class="primary">Check</button>
      </form>
      <button class="secondary" onclick="resetForm()">Refresh</button>
    </div>
  </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<input type="file" id="csvFile" hidden accept=".csv, .xlsx, .xls" onchange="loadCSV(event)">
<input type="file" id="bgImageFile" hidden accept="image/*" onchange="loadCustomBackgroundImage(event)">
<div id="popup" class="popup" onclick="outside(event)">
  <div class="popup-content">
    <h3 id="title" style="margin-top:0; font-size:20px; color:#0f172a; border-bottom:1px solid #e2e8f0; padding-bottom:12px; margin-bottom:20px;"></h3>
    <div id="content"></div>
    <div id="actions"></div>
  </div>
</div>
<div class="footer">Powered by: <a href="https://broadimagi.com" target="_blank"><b>Broadimagi</b></a></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzbldkFxSfXMB9n1cjhShA39_oBMdk7sAOlxhWLUjqpb2mazdRQ7MKo3K-pGMX9PJUZ5w/exec";
const DEFAULT_THEME_COLOR = "#3b82f6";
let masterlist = JSON.parse(localStorage.getItem("masterlist")) || [];
let settings = JSON.parse(localStorage.getItem("settings")) || { showColumns: [], confirmColumns: [], suggestionColumns: [], notificationColumns: [], currentThemeColor: DEFAULT_THEME_COLOR };
let current = null, currentIndex = null, isLiveMode = false, deviceId = "";
let currentPopupType = "", cachedSuggestionsHTML = "", currentFocusIdx = -1;

const popupNode = document.getElementById("popup"), titleNode = document.getElementById("title"), contentNode = document.getElementById("content"), actionsNode = document.getElementById("actions"), inputNode = document.getElementById("nameInput"), statusNode = document.getElementById("simpleStatusText"), frontDashboardHud = document.getElementById("frontDashboardHud"), frontTotalVal = document.getElementById("frontTotalVal"), frontCheckedVal = document.getElementById("frontCheckedVal"), frontPendingVal = document.getElementById("frontPendingVal"), frontRateVal = document.getElementById("frontRateVal"), toastContainer = document.getElementById("toastContainer");

window.addEventListener("DOMContentLoaded", () => {
  setupDeviceIdentity();
  const savedEventId = localStorage.getItem("connectedEventId"), savedPassword = localStorage.getItem("connectedPassword");
  if (savedEventId && savedPassword) fetchLiveMasterlist(savedEventId, savedPassword); else updateModeUI(false);
  if (!settings.notificationColumns) settings.notificationColumns = [];
  if (!settings.currentThemeColor) settings.currentThemeColor = DEFAULT_THEME_COLOR;
  const customImg = localStorage.getItem("customThemePicture");
  if (customImg) applyImageBackground(customImg); else applyColorEngine(settings.currentThemeColor);
  refreshFrontDashboardCounters();
  inputNode.focus();
  setInterval(runBackgroundSyncHeartbeat, 15000);
});

function setupDeviceIdentity() {
  let savedId = localStorage.getItem("operatorIdentityName");
  if (!savedId) { savedId = "Device-" + Math.floor(1000 + Math.random() * 9000); localStorage.setItem("operatorIdentityName", savedId); }
  deviceId = savedId;
  updateModeUI(isLiveMode);
}
function updateDeviceIdentity(newName) {
  let val = newName.trim(); if(!val) return; localStorage.setItem("operatorIdentityName", val); deviceId = val; updateModeUI(isLiveMode);
}
function unlockOperatorIdentityField() {
  if (prompt("Enter admin credentials to modify the tracking UID:") === "Broadimagi") {
    const fieldNode = document.getElementById("operatorIdentityInput"); if(fieldNode) { fieldNode.removeAttribute("disabled"); fieldNode.style.backgroundColor = "white"; fieldNode.focus(); }
    const unlockBtn = document.getElementById("operatorUnlockBtn"); if(unlockBtn) unlockBtn.style.display = "none";
  } else { alert("Unauthorized Action: Invalid security credentials entered."); }
}
function applyColorEngine(hex) {
  if (!hex || !hex.startsWith("#")) hex = DEFAULT_THEME_COLOR;
  settings.currentThemeColor = hex; localStorage.setItem("settings", JSON.stringify(settings));
  document.body.style.background = "";
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  let deepBaseColor = `rgb(${Math.round(r * 0.15) + 8}, ${Math.round(g * 0.15) + 10}, ${Math.round(b * 0.15) + 18})`;
  document.documentElement.style.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
  document.documentElement.style.setProperty('--bg-gradient', `linear-gradient(135deg, ${deepBaseColor}, rgb(${Math.round(r*0.6)}, ${Math.round(g*0.6)}, ${Math.round(b*0.6)}))`);
  document.body.classList.remove("bg-dark-contrast", "bg-light-contrast");
  document.body.classList.add((0.299 * r + 0.587 * g + 0.114 * b) > 165 ? "bg-light-contrast" : "bg-dark-contrast");
}
function applyImageBackground(dataUrl) { document.body.style.background = `url(${dataUrl})`; analyzeBackgroundBrightness(dataUrl); }
function analyzeBackgroundBrightness(dataUrl) {
  const img = new Image(); img.src = dataUrl;
  img.onload = () => {
    const canvas = document.createElement("canvas"), ctx = canvas.getContext("2d"); canvas.width = 40; canvas.height = 40; ctx.drawImage(img, 0, 0, 40, 40);
    try {
      const imgData = ctx.getImageData(0, 0, 40, 40).data; let totalLuminance = 0;
      for (let i = 0; i < imgData.length; i += 4) { totalLuminance += (0.299 * imgData[i] + 0.587 * imgData[i+1] + 0.114 * imgData[i+2]); }
      document.body.classList.remove("bg-dark-contrast", "bg-light-contrast");
      document.body.classList.add((totalLuminance / 1600) > 140 ? "bg-light-contrast" : "bg-dark-contrast");
    } catch(err) { document.body.classList.add("bg-dark-contrast"); }
  };
}
function handlePickerChange(val) {
  if (val.length === 7 && val.startsWith("#")) {
    localStorage.removeItem("customThemePicture"); applyColorEngine(val);
    const textInp = document.getElementById("themeHexText"), clrInp = document.getElementById("themeHexPicker");
    if(textInp) textInp.value = val; if(clrInp) clrInp.value = val;
  }
}
function triggerImageUpload() { document.getElementById("bgImageFile").click(); }
function clearImageBackground() { localStorage.removeItem("customThemePicture"); applyColorEngine(settings.currentThemeColor || DEFAULT_THEME_COLOR); const clearBtn = document.getElementById("themeClearBgBtn"); if(clearBtn) clearBtn.style.display = "none"; }
function loadCustomBackgroundImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { try { localStorage.setItem("customThemePicture", ev.target.result); applyImageBackground(ev.target.result); const clearBtn = document.getElementById("themeClearBgBtn"); if(clearBtn) clearBtn.style.display = "inline-flex"; } catch(error) { alert("Image file size too large for local cache."); } };
  reader.readAsDataURL(file);
}
function updateModeUI(live) { 
  isLiveMode = live; 
  statusNode.innerHTML = `● ${live ? "LIVE" : "LOCAL"} MODE | ${deviceId}`;
  statusNode.className = live ? "simple-status status-live-dot" : "simple-status status-local-dot"; 
}
function connectSheet() {
  const eventId = document.getElementById("sheetUrlPopupInput").value.trim(), password = document.getElementById("sheetPasswordPopupInput").value.trim();
  if (!eventId || !password) return alert("Please enter both an Event ID and Password to connect.");
  if (!isLiveMode && masterlist.some(x => ["Checked", "Checked-in"].includes(x.Status || x.status))) {
    if (confirm("Warning: You have local check-ins! Connecting will reset your view. Download backup?")) download(); else return;
  }
  fetchLiveMasterlist(eventId, password);
}
function disconnectSheet(bypassPrompt = false) {
  if (!bypassPrompt && prompt("Enter admin password to disconnect sheet:") !== "Broadimagi") return;
  localStorage.removeItem("connectedEventId"); localStorage.removeItem("connectedPassword");
  masterlist = JSON.parse(localStorage.getItem("masterlist")) || [];
  settings.showColumns = []; settings.confirmColumns = []; settings.suggestionColumns = []; settings.notificationColumns = [];
  localStorage.setItem("settings", JSON.stringify(settings)); updateModeUI(false); refreshFrontDashboardCounters(); openSettings();
}
async function fetchLiveMasterlist(eventId, password) {
  try {
    if (popupNode.style.display !== "flex") showPopup("Loading...", "Fetching structural logs...", "", "other");
    const response = await fetch(`${API_URL}?eventId=${encodeURIComponent(eventId)}&password=${encodeURIComponent(password)}`);
    const data = await response.json();
    if (data.error) { updateModeUI(false); return showPopup("Access Denied", `Google API Error: ${data.error}`, "", "other"); }
    localStorage.setItem("connectedEventId", eventId); localStorage.setItem("connectedPassword", password);
    masterlist = data; updateModeUI(true);
    if (masterlist.length > 0 && (!settings.showColumns || !settings.showColumns.length)) {
      const headers = Object.keys(masterlist[0]).filter(x => !["rowId", "Status", "Time", "UID", "status", "time"].includes(x));
      settings.showColumns = headers.slice(0, 4); settings.suggestionColumns = headers.slice(0, 3); settings.confirmColumns = headers.slice(0, 3); 
      const matchedNameCol = headers.find(h => h.toLowerCase() === "name");
      settings.notificationColumns = matchedNameCol ? [matchedNameCol] : headers.slice(0, 1);
      localStorage.setItem("settings", JSON.stringify(settings));
    }
    refreshFrontDashboardCounters(); closePopup();
  } catch (err) { updateModeUI(false); showPopup("Sync Offline", "Could not connect to database endpoint.", "", "other"); }
}
function refreshFrontDashboardCounters() {
  if(!frontDashboardHud) return;
  const total = masterlist.length;
  if (total === 0) { frontDashboardHud.style.display = "none"; return; }
  frontDashboardHud.style.display = "flex";
  const checked = masterlist.reduce((acc, row) => acc + (["Checked", "Checked-in"].includes(row.Status || row.status) ? 1 : 0), 0);
  frontTotalVal.innerText = total; frontCheckedVal.innerText = checked; frontPendingVal.innerText = total - checked;
  frontRateVal.innerText = Math.round((checked / total) * 100) + "%";
}
async function runBackgroundSyncHeartbeat() {
  if (!isLiveMode || ["suggestions", "confirmation"].includes(currentPopupType)) return;
  const eventId = localStorage.getItem("connectedEventId"), password = localStorage.getItem("connectedPassword");
  if (!eventId || !password) return;
  try {
    const response = await fetch(`${API_URL}?eventId=${encodeURIComponent(eventId)}&password=${encodeURIComponent(password)}`);
    const freshData = await response.json();
    if (Array.isArray(freshData)) {
      const localMap = new Map(masterlist.map(x => [String(x.rowId), x]));
      freshData.forEach(freshRow => {
        const localMatch = localMap.get(String(freshRow.rowId));
        if (localMatch && !["Checked", "Checked-in"].includes(localMatch.Status || localMatch.status) && ["Checked", "Checked-in"].includes(freshRow.Status || freshRow.status)) {
          let cols = settings.notificationColumns?.length ? settings.notificationColumns : Object.keys(freshRow).filter(x => !["rowId", "Status", "Time", "UID", "status", "time"].includes(x));
          triggerStreamToastNotification(cols.map(c => freshRow[c]).filter(Boolean).join(" — ") || freshRow.Name || "Guest Label");
        }
      });
      masterlist = freshData; refreshFrontDashboardCounters();
      if (currentPopupType === "masterlist") renderMasterlistRowsHTMLOnly();
    }
  } catch(e) { console.log("Sync heartbeat idle."); }
}
function openFile(){ document.getElementById("csvFile").click(); }
function loadCSV(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = ev.target.result.split("\n"), headers = rows[0].split(",").map(h => h.trim());
    let added = 0;
    rows.slice(1).forEach(r => {
      if (!r.trim()) return; let obj = {}; r.split(",").forEach((v, i) => obj[headers[i]] = v.trim()); obj.Status = ""; obj.Time = ""; obj.UID = "";
      if (!masterlist.some(x => headers.every(h => x[h] === obj[h]))) { masterlist.push(obj); added++; }
    });
    if (!settings.showColumns || !settings.showColumns.length) { 
      settings.showColumns = headers.slice(0, 4); settings.suggestionColumns = headers.slice(0, 3); settings.confirmColumns = headers.slice(0, 3); 
      const matchedNameCol = headers.find(h => h.toLowerCase() === "name"); settings.notificationColumns = matchedNameCol ? [matchedNameCol] : headers.slice(0, 1);
    }
    localStorage.setItem("masterlist", JSON.stringify(masterlist)); localStorage.setItem("settings", JSON.stringify(settings));
    refreshFrontDashboardCounters(); showPopup("Upload Complete", `Added: ${added}`, "", "other");
  };
  reader.readAsText(file);
}

function checkName(){
  if (!masterlist || masterlist.length === 0) return showPopup("Not Found", "No data has been uploaded or linked.", "", "other");
  const val = inputNode.value.toLowerCase().trim(); if(!val) return;
  let activeSearchCols = settings.suggestionColumns?.length ? settings.suggestionColumns : Object.keys(masterlist[0]).filter(x => !["rowId", "Status", "Time", "UID", "status", "time"].includes(x));
  const sug = masterlist.filter(row => activeSearchCols.some(col => row[col] && String(row[col]).toLowerCase().includes(val)));
  if(!sug.length) return showPopup("Not Found","No data found for this search..", "", "other");
  sug.sort((a, b) => (activeSearchCols.some(c => String(b[c]).toLowerCase() === val) ? 1 : 0) - (activeSearchCols.some(c => String(a[c]).toLowerCase() === val) ? 1 : 0));
  const displayLimit = sug.slice(0, 5); currentFocusIdx = 0;
  
  // Dynamic Grid column distribution based on settings length
  let columnCount = settings.suggestionColumns.length || 1;
  
  let html = `<div class="modal-instruction-hint"> ⌨ Suggestions Hotkeys: Use <span>↑</span> / <span>↓</span> to navigate, <span>Enter</span> to select.</div><div class="suggestion-container">` + displayLimit.map((i, index) => {
    let idx = masterlist.indexOf(i);
    
    let gridCellsHtml = settings.suggestionColumns.map(c => `
      <div class="sug-grid-cell">
        <span class="sug-grid-label">${c}</span>
        <span class="sug-grid-value">${i[c] || "—"}</span>
      </div>
    `).join("");

    return `<button class="suggestion-card ${index === 0 ? 'focused' : ''}" data-idx="${idx}" onclick="selectSuggestion(${idx}, true)">
      <div class="sug-grid-layout" style="grid-template-columns: repeat(${columnCount}, minmax(0, 1fr));">
        ${gridCellsHtml}
      </div>
      <div class="sug-action-row">
        ${["Checked", "Checked-in"].includes(i.Status || i.status) ? `<span class="sug-checked-tag">✓ Already Checked-In</span>` : `<span class="sug-action-tag">→ Tap to Verify & Check-In</span>`}
      </div>
    </button>`;
  }).join("") + `</div>`;
  
  cachedSuggestionsHTML = html; showPopup("Select Guest Profile Matched", html, "", "suggestions");
}

function selectSuggestion(index, triggeredFromSuggestionsList = true){
  currentIndex = index; current = masterlist[index];
  let columnCount = settings.confirmColumns.length || 1;
  
  let content = `<div class="modal-instruction-hint" style="font-size: 14px; padding: 12px; margin-bottom: 20px;"> ⌨ Confirmation Hotkeys: Press <span>Enter</span> to Confirm, <span>Backspace</span> to go back.</div>`;
  
  content += `<div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; margin-bottom: 20px; text-align: left;">
    <div style="display: grid; grid-template-columns: repeat(${columnCount}, minmax(0, 1fr)); gap: 20px;">` + 
    settings.confirmColumns.map(c => `
      <div>
        <span style="color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; display: block; margin-bottom: 4px;">${c}</span>
        <span style="font-size: 16px; font-weight: 700; color: #0f172a; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${current[c] || "—"}</span>
      </div>
    `).join("") + `
    </div>
  </div>`;
  
  if(["Checked", "Checked-in"].includes(current.Status || current.status)){
    return showPopup("<span style='color:#ef4444; font-size: 24px; font-weight: 800;'> ❌ Action Blocked</span>", 
      `<p style="color:#ef4444; font-weight:800; font-size: 18px; margin-bottom: 15px;">Already checked in!</p>
       <div style="display: flex; justify-content: space-between; align-items: center; background: #fef2f2; border: 1px solid #fecaca; padding: 12px 16px; border-radius: 10px; text-align: left; margin-bottom: 20px;">
         <div><span style="display: block; font-size: 10px; color: #991b1b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Status</span><span style="font-size: 14px; font-weight: 700; color: #ef4444;">● Blocked</span></div>
         <div style="text-align: right;"><span style="display: block; font-size: 10px; color: #991b1b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Timestamp</span><span style="font-size: 13px; font-weight: 600; color: #991b1b;">${current.Time || current.time || 'No timestamp.'}</span></div>
       </div>${content}`, 
      triggeredFromSuggestionsList ? `<button onclick="goBackToSuggestions()" style="background:#64748b; color:white; font-size:16px; padding:14px; font-weight:600; border-radius:12px;">Go Back</button>` : `<button onclick="afterCheckIn()" style="background:#64748b; color:white; font-size:16px; padding:14px; font-weight:600; border-radius:12px;">Close</button>`, 
      "confirmation"
    );
  }
  
  showPopup("<span style='font-size: 24px; font-weight: 800; color: #0f172a;'>Verify Profile Data & Confirm</span>", 
    content, 
    `<button class="primary" onclick="checkIn()" style="background:#10b981; font-weight:800; padding:16px; font-size:18px; letter-spacing: 0.5px; border-radius:12px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);">Confirm Check-In (Enter)</button>` + 
    (triggeredFromSuggestionsList ? `<button onclick="goBackToSuggestions()" style="background:#64748b; color:white; margin-top:12px; font-size:16px; padding:14px; font-weight: 600; border-radius:12px;">Go Back</button>` : ""), 
    "confirmation"
  );
}

function goBackToSuggestions() {
  showPopup("Select Guest Profile Matched", cachedSuggestionsHTML, "", "suggestions");
  setTimeout(() => { const cards = document.querySelectorAll(".suggestion-card"); if(cards.length > 0) { if(currentFocusIdx < 0 || currentFocusIdx >= cards.length) currentFocusIdx = 0; updateCardFocusUI(cards); } }, 10);
}
function triggerStreamToastNotification(nameString) {
  if (!toastContainer) return;
  while (toastContainer.children.length >= 5) toastContainer.removeChild(toastContainer.children[0]);
  const toast = document.createElement("div"); toast.className = "toast-notification"; toast.innerHTML = `<span class="toast-dot">●</span> <b>${nameString}</b> checked in`;
  toastContainer.appendChild(toast); setTimeout(() => { if (toast.parentNode === toastContainer) toast.remove(); }, 45000);
}

async function checkIn(){
  if (currentIndex === null) return;
  const time = new Date().toLocaleString(), targetGuest = masterlist[currentIndex], eventId = localStorage.getItem("connectedEventId"), password = localStorage.getItem("connectedPassword");
  if (isLiveMode) {
    showPopup("Verifying...", "Checking database state...", "", "other");
    try {
      const verifyResponse = await fetch(`${API_URL}?eventId=${encodeURIComponent(eventId)}&password=${encodeURIComponent(password)}`);
      const freshestData = await verifyResponse.json();
      if (Array.isArray(freshestData)) {
        masterlist = freshestData; const freshlyPolledRow = masterlist.find(x => String(x.rowId) === String(targetGuest.rowId));
        if (freshlyPolledRow && ["Checked", "Checked-in"].includes(freshlyPolledRow.Status || freshlyPolledRow.status)) {
          return showPopup("<span style='color:#ef4444;'> ❌ Overwrite Blocked</span>", `Collision Protected! Another operator checked this person in.<br><br>` + settings.confirmColumns.map(c => `<b>${c}:</b> ${freshlyPolledRow[c] || ""}`).join("<br>"), `<button onclick="afterCheckIn()" style="background:#64748b;color:white;">Dismiss</button>`, "other");
        }
      }
    } catch (err) { return showPopup("Network Error", "Verification failed.", "", "other"); }
    showPopup("Saving...", "Pushing updates live...", "", "other");
    try {
      const response = await fetch(API_URL, { method: "POST", body: JSON.stringify({ eventId, password, rowId: targetGuest.rowId, status: "Checked", time, operator: deviceId }) });
      const result = await response.json(); if(!result.success) return showPopup("Sync Refused", "Error: " + result.error, "", "other");
    } catch (err) { return showPopup("Network Error", "Sync failed.", "", "other"); }
  }
  masterlist[currentIndex].Status = "Checked"; masterlist[currentIndex].Time = time;
  if (!isLiveMode) localStorage.setItem("masterlist", JSON.stringify(masterlist));
  let nCols = settings.notificationColumns?.length ? settings.notificationColumns : Object.keys(targetGuest).filter(x => !["rowId", "Status", "Time", "UID", "status", "time"].includes(x));
  triggerStreamToastNotification(nCols.map(c => targetGuest[c]).filter(Boolean).join(" — ") || targetGuest.Name || "Guest Profile");
  refreshFrontDashboardCounters();
  
  let columnCount = settings.confirmColumns.length || 1;
  let successContent = `<div style="text-align: center; margin-bottom: 25px;"><div style="width: 72px; height: 72px; background: #dcfce7; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px auto; font-size: 36px; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15);">✓</div><p style="margin: 0; font-size: 15px; color: #64748b; font-weight: 500;">Guest is now verified & recorded</p></div><div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 14px; padding: 20px; margin-bottom: 20px; text-align: left;"><div style="display: grid; grid-template-columns: repeat(${columnCount}, minmax(0, 1fr)); gap: 20px;">` + settings.confirmColumns.map(c => `<div><span style="color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; display: block; margin-bottom: 4px;">${c}</span><span style="font-size: 16px; font-weight: 700; color: #0f172a; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${masterlist[currentIndex][c] || "—"}</span></div>`).join("") + `</div></div><div style="display: flex; justify-content: space-between; align-items: center; background: #eff6ff; border: 1px solid #bfdbfe; padding: 12px 16px; border-radius: 10px; text-align: left; margin-bottom: 10px;"><div><span style="display: block; font-size: 10px; color: #1e40af; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Status</span><span style="font-size: 14px; font-weight: 700; color: #1d4ed8; display: inline-flex; align-items: center; gap: 6px;"><span style="color: #10b981;">●</span> Checked In</span></div><div style="text-align: right;"><span style="display: block; font-size: 10px; color: #1e40af; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">Timestamp</span><span style="font-size: 13px; font-weight: 600; color: #1e3a8a;">${time}</span></div></div>`;
  showPopup("<span style='font-size: 24px; font-weight: 800; color: #0f172a;'>Checked-In Successfully</span>", successContent, `<button onclick="afterCheckIn()" style="background: #10b981; color: white; font-size: 16px; padding: 14px; font-weight: 700; border-radius: 12px; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);">Dismiss & Next Guest (Enter)</button>`, "success");
}

function openSettings(){
  const savedEventId = localStorage.getItem("connectedEventId") || "", savedPassword = localStorage.getItem("connectedPassword") || "", hexValue = settings.currentThemeColor || DEFAULT_THEME_COLOR, hasBgImg = !!localStorage.getItem("customThemePicture");
  const headers = Object.keys(masterlist[0]||{}).filter(x => !["Status", "Time", "UID", "status", "time", "rowId"].includes(x));
  let hHtml = `<div class="settings-combined-layout-row"><div class="section-block"><span class="settings-section-title">Tracking Mapping (UID)</span><div class="settings-input-group"><input type="text" id="operatorIdentityInput" value="${deviceId}" disabled onchange="updateDeviceIdentity(this.value)" style="background-color: #f1f5f9; cursor: not-allowed; font-weight: bold;"><button id="operatorUnlockBtn" onclick="unlockOperatorIdentityField()" style="background: #e11d48; color: white;"> 🔒 Unlock</button></div></div><div class="section-block"><span class="settings-section-title">Visual Branding Color Engine</span><div class="picker-container"><input type="color" id="themeHexPicker" value="${hexValue}" oninput="handlePickerChange(this.value)"><input type="text" id="themeHexText" value="${hexValue}" maxlength="7" oninput="handlePickerChange(this.value)"><button class="btn-bg-img-upload" onclick="triggerImageUpload()"> 🖼️ Wallpaper</button><button id="themeClearBgBtn" class="btn-bg-clear" onclick="clearImageBackground()" style="display: ${hasBgImg ? 'inline-flex' : 'none'};"> ❌ Clear</button></div></div></div><span class="settings-section-title" style="margin-top: 25px;">Database Gatekeeper Authentication</span><div class="settings-input-group" style="gap: 12px; margin-top: 8px;"><input type="text" id="sheetUrlPopupInput" value="${savedEventId}" placeholder="Enter Event ID..." style="flex: 2;"><input type="password" id="sheetPasswordPopupInput" value="${savedPassword}" placeholder="Enter Password..." style="flex: 2; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; height: 38px;"><button onclick="connectSheet()" class="primary" style="background:#4f46e5; flex: 1.5;">Link Event ID</button>${savedEventId ? `<button onclick="disconnectSheet()" style="background:#ef4444; color:white; flex: 1;">Disconnect</button>` : ''}</div>`;
  if (!isLiveMode) hHtml += `<span class="settings-section-title" style="margin-top: 20px;">Local Document Import</span><button class="btn-upload-setting" onclick="openFile()" style="margin-top:8px;">Upload Local File</button>`;
  hHtml += `<span class="settings-section-title" style="margin-top: 25px;">Presentation Rules Matrix</span><table class="settings-table"><thead><tr><th>Column Name</th><th class="text-center">Masterlist</th><th class="text-center">Suggestions</th><th class="text-center">Confirmation</th><th class="text-center">Notifications (Max 1)</th></tr></thead><tbody>`;
  if (headers.length === 0) hHtml += `<tr><td colspan="5" style="text-align: center; color: #64748b; padding: 20px;"><i>No database columns loaded.</i></td></tr>`; else {
    headers.forEach(h => { hHtml += `<tr><td><b>${h}</b></td><td class="text-center"><input type="checkbox" ${settings.showColumns.includes(h)?"checked":""} onchange="toggleGridSetting('showColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${settings.suggestionColumns.includes(h)?"checked":""} onchange="toggleGridSetting('suggestionColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${settings.confirmColumns.includes(h)?"checked":""} onchange="toggleGridSetting('confirmColumns', '${h}', this.checked)"></td><td class="text-center"><input type="checkbox" ${(settings.notificationColumns?.includes(h))?"checked":""} onchange="toggleGridSetting('notificationColumns', '${h}', this.checked)"></td></tr>`; });
  }
  hHtml += `</tbody></table>`; showPopup("System Configuration", hHtml, "", "other");
}
function toggleGridSetting(type, field, isChecked) { 
  if (!settings[type]) settings[type] = []; 
  if (isChecked) {
    if (type === 'notificationColumns') { settings[type] = [field]; localStorage.setItem("settings", JSON.stringify(settings)); return openSettings(); }
    if (!settings[type].includes(field)) settings[type].push(field); 
  } else { 
    if (type === 'showColumns' && settings.showColumns.length <= 1) { alert("At least 1 display column rule must remain selected inside your Masterlist layout view matrix configuration."); return openSettings(); }
    if (type === 'notificationColumns' && settings.notificationColumns.length <= 1) { alert("At least 1 active column must remain explicitly selected for parsing live stream notifications blocks."); return openSettings(); }
    settings[type] = settings[type].filter(x => x !== field); 
  } 
  localStorage.setItem("settings", JSON.stringify(settings)); 
}
function viewMasterlist(){
  if (!masterlist.length) return showPopup("No Data","No uploaded records mapped.", "", "other");
  showPopup("Masterlist Records", `<div id="masterlistContainer"></div>`, "", "masterlist"); renderMasterlistRowsHTMLOnly();
}
function renderMasterlistRowsHTMLOnly() {
  const targetBox = document.getElementById("masterlistContainer"); if(!targetBox) return;
  const total = masterlist.length, checked = masterlist.reduce((acc, r) => acc + (["Checked", "Checked-in"].includes(r.Status || r.status) ? 1 : 0), 0);
  let headers = settings.showColumns.length ? settings.showColumns : Object.keys(masterlist[0]).filter(x => !["Status", "Time", "UID", "status", "time", "rowId"].includes(x));
  let headerRow = headers.map(h => `<th>${h}</th>`).join("") + `<th>Status Mapping</th>`;
  let rows = masterlist.map(item => {
    let isCh = ["Checked", "Checked-in"].includes(item.Status || item.status);
    return `<tr>${headers.map(h => `<td>${item[h] || "—"}</td>`).join("")}<td>${isCh ? `<span class="badge badge-success">✓ Checked</span><span class="badge-time">${item.Time || item.time || ''}</span>` : `<span class="badge badge-pending">○ Pending</span>`}</td></tr>`;
  }).join("");
  let actionButtons = isLiveMode ? `<div style="margin-top:20px;text-align:center;"><p style="font-size:13px; color:#64748b; font-weight:500;">🔄 Realtime cloud connection active. Auto-syncing every 15s...</p></div>` : `<div class="masterlist-actions"><button class="primary" onclick="download()">Export CSV Document</button><button onclick="resetAll()" style="background:#f4f4f5; border:1px solid #e4e4e7; color:#27272a;">Clear Checked Statuses</button><button onclick="clearAllData()" style="background:#fef2f2; border:1px solid #fee2e2; color:#ef4444;">Purge All Imported Lists</button></div>`;
  targetBox.innerHTML = `<div class="dashboard"><div class="card-stat"><div class="stat-title">Total Records</div><div class="stat-value">${total}</div></div><div class="card-stat green"><div class="stat-title">Checked-In</div><div class="stat-value">${checked}</div></div><div class="card-stat orange"><div class="stat-title">Pending</div><div class="stat-value">${total - checked}</div></div><div class="card-stat blue"><div class="stat-title">Attendance</div><div class="stat-value">${total > 0 ? Math.round((checked / total) * 100) : 0}%</div></div></div><div class="table-wrapper"><table><thead><tr>${headerRow}</tr></thead><tbody>${rows}</tbody></table></div>${actionButtons}`;
}
function download() {
  if (masterlist.length === 0) return;
  let csv = Object.keys(masterlist[0]).join(",") + "\n"; masterlist.forEach(item => { csv += Object.values(item).join(",") + "\n"; });
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([csv])); a.download = "local_attendance_backup.csv"; a.click();
}
function resetAll() {
  if(isLiveMode || prompt("Enter admin password:") !== "Broadimagi") return;
  masterlist.forEach(item => { item.Status = ""; item.Time = ""; item.UID = ""; if(item.status) item.status=""; if(item.time) item.time=""; });
  localStorage.setItem("masterlist", JSON.stringify(masterlist)); refreshFrontDashboardCounters(); viewMasterlist();
}
function clearAllData() {
  if(isLiveMode || prompt("Enter admin password:") !== "Broadimagi" || !confirm("Download first?")) return;
  download(); setTimeout(() => { if (!confirm("Delete ALL data?")) return; masterlist = []; localStorage.removeItem("masterlist"); refreshFrontDashboardCounters(); closePopup(); }, 500);
}
function updateCardFocusUI(cards) { cards.forEach((card, idx) => { if (idx === currentFocusIdx) { card.classList.add("focused"); card.scrollIntoView({ block: "nearest" }); } else { card.classList.remove("focused"); } }); }
function afterCheckIn(){ closePopup(); inputNode.value = ""; inputNode.focus(); }
function showPopup(t, c, a = "", type = "other"){ titleNode.innerHTML = t; contentNode.innerHTML = c; actionsNode.innerHTML = a; currentPopupType = type; popupNode.style.display = "flex"; }
function closePopup(){ popupNode.style.display = "none"; currentPopupType = ""; inputNode.focus(); }
function outside(e){ if(e.target.id === "popup") closePopup(); }
function resetForm(){ inputNode.value = ""; inputNode.focus(); }

document.addEventListener("keydown", e => {
  if (popupNode.style.display !== "flex") return;
  if (currentPopupType === "suggestions") {
    const cards = document.querySelectorAll(".suggestion-card");
    if (e.key === "Backspace") { e.preventDefault(); closePopup(); }
    else if (e.key === "ArrowDown" && cards.length > 0) { e.preventDefault(); currentFocusIdx = (currentFocusIdx + 1) % cards.length; updateCardFocusUI(cards); }
    else if (e.key === "ArrowUp" && cards.length > 0) { e.preventDefault(); currentFocusIdx = (currentFocusIdx - 1 + cards.length) % cards.length; updateCardFocusUI(cards); }
    else if (e.key === "Enter" && cards.length > 0) { e.preventDefault(); const active = cards[currentFocusIdx]; if (active) active.click(); }
  }
  else if (currentPopupType === "confirmation") {
    if (e.key === "Backspace") { e.preventDefault(); cachedSuggestionsHTML ? goBackToSuggestions() : closePopup(); }
    else if (e.key === "Enter") { e.preventDefault(); const btn = actionsNode.querySelector("button"); if (btn) btn.click(); }
  }
  else if (currentPopupType === "success") {
    if (e.key === "Enter" || e.key === "Backspace") { e.preventDefault(); afterCheckIn(); }
  }
  else { if (["Enter", "Backspace"].includes(e.key)) { if(["INPUT", "SELECT"].includes(document.activeElement.tagName)) return; const btn = actionsNode.querySelector("button"); if (btn) { e.preventDefault(); btn.click(); } else closePopup(); } }
  if (e.key === "Escape") closePopup();
});
